server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:smart_mall;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

mall:
  ai:
    provider: mock
  storage:
    provider: local